{% extends "base.html" %}
{% block title %}{{ 'Edit Vulnerability' if vuln else 'Add Vulnerability' }} - Vulnapps{% endblock %}
{% block content %}
<div class="page-header">
    <h1 class="page-title">{{ 'Edit Vulnerability' if vuln else 'Add Vulnerability' }}</h1>
    <a href="/apps/{{ app.id }}" class="btn btn-outline">Cancel</a>
</div>

<div class="card">
    <form method="post" action="{{ '/apps/' ~ app.id ~ '/vulns/' ~ vuln.id ~ '/edit' if vuln else '/apps/' ~ app.id ~ '/vulns' }}">
        <div class="form-row">
            <div class="form-group">
                <label class="form-label" for="vuln_id">Vuln ID</label>
                <input type="text" id="vuln_id" name="vuln_id" class="form-input" value="{{ vuln.vuln_id if vuln else '' }}" required>
            </div>
            <div class="form-group">
                <label class="form-label" for="title">Title</label>
                <input type="text" id="title" name="title" class="form-input" value="{{ vuln.title if vuln else '' }}" required>
            </div>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label class="form-label" for="severity">Severity</label>
                <select id="severity" name="severity" class="form-select" required>
                    <option value="">Select severity</option>
                    {% for s in ['critical', 'high', 'medium', 'low', 'info'] %}
                        <option value="{{ s }}" {{ 'selected' if vuln and vuln.severity == s else '' }}>{{ s|capitalize }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="form-group">
                <label class="form-label" for="vuln_type">Vulnerability Type</label>
                <input type="text" id="vuln_type" name="vuln_type" class="form-input" value="{{ vuln.vuln_type if vuln else '' }}" required>
            </div>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label class="form-label" for="http_method">HTTP Method</label>
                <select id="http_method" name="http_method" class="form-select">
                    <option value="">Select method</option>
                    {% for m in ['GET', 'POST', 'PUT', 'DELETE', 'PATCH', 'OPTIONS'] %}
                        <option value="{{ m }}" {{ 'selected' if vuln and vuln.http_method == m else '' }}>{{ m }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="form-group">
                <label class="form-label" for="url">URL</label>
                <input type="text" id="url" name="url" class="form-input" value="{{ vuln.url if vuln else '' }}">
            </div>
        </div>

        <div class="form-group">
            <label class="form-label" for="parameter">Parameter</label>
            <input type="text" id="parameter" name="parameter" class="form-input" value="{{ vuln.parameter if vuln else '' }}">
        </div>

        <div class="form-group">
            <label class="form-label" for="description">Description</label>
            <textarea id="description" name="description" class="form-textarea">{{ vuln.description if vuln else '' }}</textarea>
        </div>

        <div class="form-group">
            <label class="form-label" for="code_location">Code Location</label>
            <input type="text" id="code_location" name="code_location" class="form-input" value="{{ vuln.code_location if vuln else '' }}">
        </div>

        <div class="form-group">
            <label class="form-label" for="poc">Proof of Concept</label>
            <textarea id="poc" name="poc" class="form-textarea">{{ vuln.poc if vuln else '' }}</textarea>
        </div>

        <div class="form-group">
            <label class="form-label" for="remediation">Remediation</label>
            <textarea id="remediation" name="remediation" class="form-textarea">{{ vuln.remediation if vuln else '' }}</textarea>
        </div>

        <button type="submit" class="btn btn-primary">{{ 'Update Vulnerability' if vuln else 'Add Vulnerability' }}</button>
    </form>
</div>
{% endblock %}
