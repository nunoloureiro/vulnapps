{% extends "base.html" %}
{% block title %}{{ 'Edit' if app else 'Create' }} App - Vulnapps{% endblock %}
{% block content %}
<div style="max-width: 600px; margin: 2rem auto;">
    <div class="card">
        <h2 class="card-title mb-2">{{ 'Edit App' if app else 'Create App' }}</h2>
        <form method="post">
            <div class="form-row">
                <div class="form-group">
                    <label class="form-label" for="name">Name</label>
                    <input type="text" id="name" name="name" class="form-input" value="{{ app.name if app else '' }}" required autofocus>
                </div>
                <div class="form-group">
                    <label class="form-label" for="version">Version</label>
                    <input type="text" id="version" name="version" class="form-input" value="{{ app.version if app else '' }}" placeholder="e.g. 1.0">
                </div>
            </div>
            <div class="form-group">
                <label class="form-label" for="description">Description</label>
                <textarea id="description" name="description" class="form-textarea" rows="4">{{ app.description if app else '' }}</textarea>
            </div>
            <div class="form-group">
                <label class="form-label" for="url">URL</label>
                <input type="url" id="url" name="url" class="form-input" value="{{ app.url if app else '' }}">
            </div>
            <div class="form-group">
                <label class="form-label" for="tech_stack">Tech Stack</label>
                <input type="text" id="tech_stack" name="tech_stack" class="form-input" value="{{ tech_stack }}" placeholder="e.g. PHP, Next.js, SQLite">
                <span class="text-muted text-xs">Comma-separated list of technologies</span>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label class="form-label" for="visibility">Visibility</label>
                    <select id="visibility" name="visibility" class="form-select">
                        {% for v in ['public', 'team', 'private'] %}
                            <option value="{{ v }}" {{ 'selected' if app and app.visibility == v else ('selected' if not app and v == 'public' else '') }}>{{ v|capitalize }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="form-group" id="team-group" style="display: none;">
                    <label class="form-label" for="team_id">Team</label>
                    <select id="team_id" name="team_id" class="form-select">
                        <option value="">Select team</option>
                        {% for t in teams %}
                            <option value="{{ t.id }}" {{ 'selected' if app and app.team_id == t.id else '' }}>{{ t.name }}</option>
                        {% endfor %}
                    </select>
                </div>
            </div>
            <script>
            (function() {
                var vis = document.getElementById('visibility');
                var tg = document.getElementById('team-group');
                var teamSel = document.getElementById('team_id');
                function toggle() {
                    var isTeam = vis.value === 'team';
                    tg.style.display = isTeam ? '' : 'none';
                    teamSel.required = isTeam;
                }
                vis.addEventListener('change', toggle);
                toggle();
            })();
            </script>
            <button type="submit" class="btn btn-primary" style="width:100%">{{ 'Update App' if app else 'Create App' }}</button>
        </form>
    </div>
</div>
{% endblock %}
