{% extends "base.html" %}
{% block title %}Register - Vulnapps{% endblock %}
{% block content %}
<div style="max-width: 400px; margin: 3rem auto;">
    <div class="card">
        <h2 class="card-title mb-2">Create Account</h2>
        <form method="post" action="/auth/register">
            <div class="form-group">
                <label class="form-label" for="name">Name</label>
                <input type="text" id="name" name="name" class="form-input" required autofocus>
            </div>
            <div class="form-group">
                <label class="form-label" for="email">Email</label>
                <input type="email" id="email" name="email" class="form-input" required>
            </div>
            <div class="form-group">
                <label class="form-label" for="password">Password</label>
                <input type="password" id="password" name="password" class="form-input" required minlength="6">
            </div>
            <button type="submit" class="btn btn-primary" style="width:100%">Register</button>
        </form>
        <p class="text-sm text-secondary mt-2">Already have an account? <a href="/auth/login">Login</a></p>
    </div>
</div>
{% endblock %}
