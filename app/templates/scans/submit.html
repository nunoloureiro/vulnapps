{% extends "base.html" %}
{% block title %}Submit Scan - Vulnapps{% endblock %}
{% block content %}
<div class="page-header">
    <h1 class="page-title">Submit Scan for {{ app.name }}</h1>
    <a href="/apps/{{ app.id }}" class="btn btn-outline">Cancel</a>
</div>

<div class="card">
    <form method="post" action="/apps/{{ app.id }}/scans" id="scan-form">
        <div class="form-row">
            <div class="form-group">
                <label class="form-label" for="scanner_name">Scanner Name</label>
                <input type="text" id="scanner_name" name="scanner_name" class="form-input" required>
            </div>
            <div class="form-group">
                <label class="form-label" for="scan_date">Scan Date</label>
                <input type="date" id="scan_date" name="scan_date" class="form-input" required>
            </div>
        </div>

        <div class="form-row">
            <div class="form-group">
                <div class="form-check mt-2">
                    <input type="checkbox" id="authenticated" name="authenticated" value="1">
                    <label class="form-label" for="authenticated" style="margin-bottom:0">Authenticated Scan</label>
                </div>
            </div>
            <div class="form-group">
                <div class="form-check mt-2">
                    <input type="checkbox" id="is_public" name="is_public" value="1" checked>
                    <label class="form-label" for="is_public" style="margin-bottom:0">Public</label>
                </div>
            </div>
        </div>

        <div class="form-group">
            <label class="form-label" for="notes">Notes</label>
            <textarea id="notes" name="notes" class="form-textarea"></textarea>
        </div>

        <h3 class="card-title mt-3 mb-2">Findings</h3>

        <div id="findings-container">
            <div class="finding-row card mb-2" style="padding: 1rem;" data-index="0">
                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label">Vulnerability Type</label>
                        <input type="text" name="findings[0][vuln_type]" class="form-input" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">HTTP Method</label>
                        <select name="findings[0][http_method]" class="form-select">
                            <option value="">Select method</option>
                            <option value="GET">GET</option>
                            <option value="POST">POST</option>
                            <option value="PUT">PUT</option>
                            <option value="DELETE">DELETE</option>
                            <option value="PATCH">PATCH</option>
                            <option value="OPTIONS">OPTIONS</option>
                        </select>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label">URL</label>
                        <input type="text" name="findings[0][url]" class="form-input">
                    </div>
                    <div class="form-group">
                        <label class="form-label">Parameter</label>
                        <input type="text" name="findings[0][parameter]" class="form-input">
                    </div>
                </div>
                <button type="button" class="btn btn-danger btn-sm remove-finding">Remove</button>
            </div>
        </div>

        <button type="button" id="add-finding" class="btn btn-outline mb-2">Add Finding</button>

        <div class="mt-3">
            <button type="submit" class="btn btn-primary">Submit Scan</button>
        </div>
    </form>
</div>

<script>
(function() {
    var container = document.getElementById('findings-container');
    var addBtn = document.getElementById('add-finding');
    var index = 1;

    addBtn.addEventListener('click', function() {
        var row = document.createElement('div');
        row.className = 'finding-row card mb-2';
        row.style.padding = '1rem';
        row.dataset.index = index;
        row.innerHTML =
            '<div class="form-row">' +
                '<div class="form-group">' +
                    '<label class="form-label">Vulnerability Type</label>' +
                    '<input type="text" name="findings[' + index + '][vuln_type]" class="form-input" required>' +
                '</div>' +
                '<div class="form-group">' +
                    '<label class="form-label">HTTP Method</label>' +
                    '<select name="findings[' + index + '][http_method]" class="form-select">' +
                        '<option value="">Select method</option>' +
                        '<option value="GET">GET</option>' +
                        '<option value="POST">POST</option>' +
                        '<option value="PUT">PUT</option>' +
                        '<option value="DELETE">DELETE</option>' +
                        '<option value="PATCH">PATCH</option>' +
                        '<option value="OPTIONS">OPTIONS</option>' +
                    '</select>' +
                '</div>' +
            '</div>' +
            '<div class="form-row">' +
                '<div class="form-group">' +
                    '<label class="form-label">URL</label>' +
                    '<input type="text" name="findings[' + index + '][url]" class="form-input">' +
                '</div>' +
                '<div class="form-group">' +
                    '<label class="form-label">Parameter</label>' +
                    '<input type="text" name="findings[' + index + '][parameter]" class="form-input">' +
                '</div>' +
            '</div>' +
            '<button type="button" class="btn btn-danger btn-sm remove-finding">Remove</button>';
        container.appendChild(row);
        index++;
    });

    container.addEventListener('click', function(e) {
        if (e.target.classList.contains('remove-finding')) {
            var row = e.target.closest('.finding-row');
            if (container.querySelectorAll('.finding-row').length > 1) {
                row.remove();
            }
        }
    });
})();
</script>
{% endblock %}
